<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>מערכת הזמנת ציוד - סניף עפולה</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="box">
  <h1>🚑 מערכת הזמנת ציוד</h1>
  <h2>סניף עפולה</h2>

  <div id="loginBox">
    <input id="codeInput" placeholder="הכנס קוד">
    <button onclick="login()">כניסה</button>
    <p id="msg"></p>
  </div>

  <div id="volunteerApp" style="display:none">
    <h3 id="hello"></h3>
    <div id="menusBox"></div>
    <div class="divider"></div>
    <button class="menu-btn orders-btn" onclick="loadMyOrders()">📦 ההזמנות שלי</button>
    <div id="content"></div>
  </div>

  <div id="managerApp" style="display:none">
    <h3>👨‍💼 מנהל מחסן</h3>
    <button class="menu-btn" onclick="managerLoadOrders()">📦 כל ההזמנות</button>
    <button class="menu-btn" disabled>📊 ניהול מלאי</button>
    <button class="menu-btn" disabled>➕ הוספת פריט</button>
    <div id="managerContent"></div>
  </div>
</div>

<div id="infoModal" class="modal">
  <div class="modal-box">
    <h3 id="infoTitle"></h3>
    <p id="infoText"></p>
    <button onclick="closeInfo()">סגור</button>
  </div>
</div>

<div id="confirmModal" class="modal">
  <div class="modal-box">
    <h3>אישור הזמנה</h3>
    <div id="confirmContent"></div>
    <button onclick="sendOrder()">שלח הזמנה</button>
    <button onclick="closeConfirm()">חזור</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
<script type="module" src="js/manager.js"></script>

</body>
</html>
